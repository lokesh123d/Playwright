name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-shard:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
        total: [4]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests on shard ${{ matrix.shard }}
        run: npx playwright test --shard=${{ matrix.shard }}/${{ matrix.total }}
        env:
          ALLURE_RESULTS_DIR: allure-results

      - name: Upload Allure results for shard ${{ matrix.shard }}
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: allure-results-shard-${{ matrix.shard }}
          path: allure-results/
          retention-days: 30

  allure-report:
    name: Generate Allure report
    runs-on: ubuntu-latest
    needs: test-shard
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          path: allure-results
          pattern: allure-results-shard-*
          merge-multiple: true

      - name: Generate Allure report
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
